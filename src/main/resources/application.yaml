spring:
  application:
    name: travel

  datasource:
    url: jdbc:h2:mem:traveldb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080

app:
  jwt:
    secret: TravelBookingSecretKey2024VeryLongSecretKeyForHMACsha256Algorithm
    expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
